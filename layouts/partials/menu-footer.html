<section id="authors">
  <h5>Authors</h5>
  <ul>
    {{ with .Site.Params.authors }}
      {{ range . }}
        <li><a class="padding" href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a></li>
      {{ end }}
    {{ end }}
  </ul>
</section>

<section id="more-footer">
  {{/* keep original theme footer content */}}
  <p>
    Built with
    <a href="https://github.com/matcornic/hugo-theme-learn"><i class="fas fa-heart"></i></a>
    from <a href="https://getgrav.org">Grav</a> and <a href="https://gohugo.io/">Hugo</a>
  </p>
</section>
