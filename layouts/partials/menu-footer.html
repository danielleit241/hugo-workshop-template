<section id="authors">
  <h5>Authors</h5>
  <ul>
    {{ with .Site.Params.authors }}
      {{ range . }}
        <li><a class="padding" href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a></li>
      {{ end }}
    {{ end }}
  </ul>
</section>

<section id="more-footer">
  <h5>More</h5>
  <ul>
    <li><a class="padding" href="https://aws.amazon.com/blogs/" target="_blank" rel="noopener">AWS Study Group - Blog</a></li>
    <li><a class="padding" href="https://www.facebook.com/groups/awsstudygroupfcj" target="_blank" rel="noopener">AWS Study Group - FB Group</a></li>
  </ul>
</section>

<section id="team-footer">
  <h5>Team</h5>
  <p class="team-name">Team 03 - First Cloud AI Journey</p>
</section>
